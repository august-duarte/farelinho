<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farelinho - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f5f5dc] min-h-screen">

  <header class="sticky top-0 z-50 bg-[#f5f5dc] border-b border-amber-200 shadow-sm">
    <div class="py-6 flex items-center justify-center gap-4">
      <img src="imagens/cookie-icon.png" alt="Logo" class="w-14 h-14 object-contain">
      <h1 class="text-5xl font-black text-amber-900 font-serif tracking-tight">Farelinho</h1>
    </div>
    
    <div class="max-w-xl mx-auto pb-6 px-6">
      <div class="relative">
        <input type="text" id="campo-busca" placeholder="O que você quer comer hoje?" 
          class="w-full bg-white border-2 border-amber-100 rounded-full py-3 px-6 text-amber-900 focus:outline-none focus:border-amber-400 shadow-sm transition-all text-lg font-medium">
        <span class="absolute right-6 top-3 text-amber-300 text-2xl">🔍</span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-12">
    <div id="botoes-container" class="grid grid-cols-1 md:grid-cols-3 gap-10">
      </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
